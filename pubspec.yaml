name: waterboard
description: "The specialized driver dashboard that runs on the Manned Boat, powered by Flutter | Stevens Electric Boatworks"
publish_to: 'none' # Do not remove, we do not want to publish to pub.dev
homepage: https://github.com/Stevens-Electric-Boatworks/waterboard/
version: 1.2.0

environment:
  sdk: ^3.9.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  window_manager: ^0.5.1
  web_socket_channel: ^3.0.3
  import_sorter: ^4.6.0
  syncfusion_flutter_gauges: ^32.1.25
  text_gradiate: ^1.0.1
  shared_preferences: ^2.5.4
  logger: ^2.6.2
  connectivity_plus: ^7.0.0
  internet_connection_checker_plus: ^2.9.1+2
  network_info_plus: ^7.0.0

  intl: any
  flutter_map: ^7.0.2
  vector_map_tiles_pmtiles: ^1.1.0 # this package
  vector_map_tiles: ^8.0.0
  latlong2: ^0.9.1
  path_provider: ^2.1.5
  path: ^1.9.1
  mockito: ^5.6.3
  build_runner: ^2.11.1
  fake_async: ^1.3.3
  clock: ^1.1.2
  scroll_table: ^1.0.1
  collection: ^1.19.1
  pointer_lock:
    git:
      url: https://github.com/domenicomuti/pointer_lock
      ref: main
  ffi: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec
flutter_launcher_icons:
  # Windows specific settings
  windows:
    generate: true
    image_path: "assets/icon.png" # Optional: Override source for Windows
    icon_size: 256 # Size of the generated .ico file (default: 256)
  # macOS-specific settings
  macos:
    generate: true
    image_path: "assets/icon.png" # Optional: Override source for macOS
  # Linux-specific settings
  linux:
    generate: true
    image_path: "assets/icon.png" # Optional: Override source for Linux
    icon_sizes: [16, 32, 48, 64, 128, 256] # Sizes to generate (default shown)

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
     - assets/control_systems_logo.png
     - assets/sponsors/plat/asne.png
     - assets/sponsors/plat/private.png
     - assets/sponsors/gold/sname.png
     - assets/sponsors/silver/dhx.png
     - assets/compass/overlay.png
     - assets/compass/compass.png
     - assets/doom1.wad

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: BigBlue_TerminalPlus
      fonts:
        - asset: assets/BigBlue_Terminal_v1.0/BigBlue_TerminalPlus.TTF
    - family: inter
      fonts:
        - asset: assets/fonts/inter-font.ttf
        - asset: assets/fonts/inter-font-italic.ttf
          style: italic
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
